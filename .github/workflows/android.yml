name: Android CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test Android App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create Mock Env File
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          echo "GEMINI_API_KEY=dummy_value" > .env
        fi

    - name: Make Gradle Wrapper Executable
      # Note: In this project workspace, gradle is used directly without gradlew.
      # However, when exporting to GitHub, a standard wrapper is required.
      # If gradlew does not exist yet, we can generate it using gradle wrapper.
      run: |
        gradle wrapper
        chmod +x gradlew

    - name: Run Unit Tests
      run: ./gradlew :app:testDebugUnitTest --no-daemon

    - name: Build Debug APK
      run: ./gradlew :app:assembleDebug --no-daemon

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: secure-diary-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 7
